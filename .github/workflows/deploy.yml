name: Deploy — Data Approvisionnement

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    name: Deploy Worker → Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        run: cd worker && npm install

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          command: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Airtel secrets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.AIRTEL_CLIENT_ID }}" | npx wrangler secret put AIRTEL_CLIENT_ID
          echo "${{ secrets.AIRTEL_CLIENT_SECRET }}" | npx wrangler secret put AIRTEL_CLIENT_SECRET
          echo "${{ secrets.AIRTEL_PIN }}" | npx wrangler secret put AIRTEL_PIN
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET

  deploy-pages:
    name: Deploy Pages → Cloudflare
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: cd frontend && npm install && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy frontend/dist --project-name=data-appro --commit-dirty=true
